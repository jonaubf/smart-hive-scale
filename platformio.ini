; PlatformIO project for Smart Hive Scale (TTGO T-Call V1.3)
; Copy .env.example to .env and fill in secrets before building.

[env:ttgo-t-call]
extra_scripts =
    pre:extra_scripts/load_env.py
    pre:extra_scripts/embed_ca.py
    pre:extra_scripts/patch_tinygsm.py
    pre:extra_scripts/patch_sslclient.py
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    -DTINY_GSM_MODEM_SIM800
    -DTINY_GSM_RX_BUFFER=2048

board_build.sdkconfig_options =
    CONFIG_BT_ENABLED=n
    CONFIG_BLUEDROID_ENABLED=n

lib_deps =
    bogde/HX711@^0.7.5
    vshymanskyy/TinyGSM@^0.12.0
    knolleary/PubSubClient@^2.8
    https://github.com/govorox/SSLClient.git
